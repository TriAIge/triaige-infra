# Playbook de configuracao do MySQL na ec2-private-banco-dados.
#
# Instala o MySQL Server, libera conexoes externas (bind-address 0.0.0.0,
# liberado apenas para o sg-public-triaige via security group) e cria o
# banco/usuario usados pelo triaige-srv-orchestrator, com os mesmos valores
# do perfil "ho" (docker-compose.yml e application-ho.yml): database
# triaige_srv_orchestrator, usuario triaige.
#
# Alcance: a EC2 privada nao tem IP publico, entao o host e acessado via
# ProxyJump por uma das EC2 publicas (ver inventory.ini gerado pelo
# workflow, grupo triaige_private).

- name: Configurar MySQL na ec2-private-banco-dados
  hosts: triaige_private
  become: true
  vars:
    db_name: triaige_srv_orchestrator
    db_user: triaige
    db_password: triaige

  tasks:
    - name: Atualizar cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar MySQL Server
      ansible.builtin.apt:
        name: mysql-server
        state: present

    - name: Garantir que o servico MySQL esta ativo
      ansible.builtin.systemd:
        name: mysql
        state: started
        enabled: true

    - name: Detectar arquivo de configuracao do MySQL
      ansible.builtin.stat:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
      register: mysqld_cnf

    - name: Permitir conexoes externas (bind-address 0.0.0.0)
      ansible.builtin.replace:
        path: "{{ mysqld_cnf.stat.exists | ternary('/etc/mysql/mysql.conf.d/mysqld.cnf', '/etc/mysql/my.cnf') }}"
        regexp: '^bind-address\s*=.*'
        replace: 'bind-address = 0.0.0.0'
      register: mysql_bind_address

    - name: Reiniciar MySQL apos alterar bind-address
      ansible.builtin.systemd:
        name: mysql
        state: restarted
      when: mysql_bind_address.changed

    - name: Criar database
      ansible.builtin.command: >
        mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
      changed_when: false

    - name: Criar usuario com acesso remoto
      ansible.builtin.command: >
        mysql -e "CREATE USER IF NOT EXISTS '{{ db_user }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ db_password }}';"
      changed_when: false
      no_log: true

    - name: Conceder privilegios do usuario no database
      ansible.builtin.command: >
        mysql -e "GRANT ALL PRIVILEGES ON {{ db_name }}.* TO '{{ db_user }}'@'%'; FLUSH PRIVILEGES;"
      changed_when: false
