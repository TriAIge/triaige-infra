# Terraform Apply (TriAIge)
#
# Disparo manual (workflow_dispatch) que provisiona/atualiza a infra do
# Terraform em terraform/ deste repositório.
#
# Pré-requisitos (Secrets do repositório, em Settings > Secrets and
# variables > Actions):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - AWS_SESSION_TOKEN
#
# Esses três valores vêm da aba "AWS Details" > "AWS CLI" do AWS Academy
# Learner Lab e MUDAM a cada vez que o laboratório é (re)iniciado. Antes de
# disparar este workflow, copie os três valores atuais do laboratório para
# os Secrets acima (sobrescrevendo os anteriores).
#
# State remoto: como o backend continua local (terraform.tfstate não está
# versionado), o state é guardado entre execuções usando o cache do GitHub
# Actions (chave fixa "tfstate-cache"). Caches do Actions expiram após ~7
# dias sem uso — se isso acontecer, o próximo apply/destroy não terá o state
# anterior. Ver aviso equivalente no workflow de destroy.
#
# Lambda triaige-fn-ocr-normalizer: o módulo terraform/modules/compute/lambda
# exige um pacote .zip já existente (filebase64sha256). Este workflow faz
# checkout do repositório TriAIge/triaige-fn-ocr-normalizer e gera o pacote
# antes do apply, seguindo as instruções do README daquele repositório.
#
# Caso TriAIge/triaige-fn-ocr-normalizer seja um repositório privado, crie um
# Secret CROSS_REPO_TOKEN com um PAT (classic ou fine-grained) com permissão
# de leitura de conteúdo nesse repositório. Se o repositório for público,
# CROSS_REPO_TOKEN pode ficar sem valor (usa o GITHUB_TOKEN padrão).

name: Terraform Apply

on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triaige-infra
        uses: actions/checkout@v6

      - name: Checkout triaige-fn-ocr-normalizer
        uses: actions/checkout@v6
        with:
          repository: TriAIge/triaige-fn-ocr-normalizer
          path: ocr-normalizer
          token: ${{ secrets.CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Empacotar Lambda triaige-fn-ocr-normalizer
        working-directory: ocr-normalizer
        run: |
          set -euo pipefail
          mkdir -p build
          pip install -r requirements.txt -t build/ --platform manylinux2014_x86_64 --only-binary=:all:
          cp lambda_function.py extrator_juridico.py anonimizador.py build/
          (cd build && zip -r ../triaige-fn-ocr-normalizer.zip .)
          mv triaige-fn-ocr-normalizer.zip build/

      - name: Configurar credenciais AWS (Academy/Learner Lab)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Restaurar state remoto (cache)
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.TF_WORKING_DIR }}/terraform.tfstate
          key: tfstate-cache

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="lambda_ocr_normalizer_package_path=../ocr-normalizer/build/triaige-fn-ocr-normalizer.zip"

      - name: Remover cache antigo do state
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete tfstate-cache --repo ${{ github.repository }} || true

      - name: Salvar state remoto (cache)
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.TF_WORKING_DIR }}/terraform.tfstate
          key: tfstate-cache
